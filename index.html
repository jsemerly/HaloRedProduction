<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaloRed & HaloUNO Production Statuses</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>HaloRed & HaloUNO Production Statuses</h1>
    </header>

    <div class="table-header">
        <div>Date Requested</div>
        <div>Order ID</div>
        <div>SKU</div>
        <div>QTY</div>
        <div>Status</div>
        <div></div>
    </div>

    <div id="productionTable">
        <div style="padding:20px;">
            Loading production data...
        </div>
    </div>

</div>

<div id="detailsModal" class="modal">

    <div class="modal-content">

        <button class="close-btn" onclick="closeModal()">×</button>

        <div class="top-section">

            <div class="order-details">
                <h2>ORDER DETAILS</h2>
                <p><strong id="modalOrderId"></strong></p>
                <p id="modalSku"></p>
                <p id="modalQty"></p>
            </div>

            <div class="ship-to">
                <h2>SHIP TO</h2>
                <p id="modalShipTo">TBD</p>
            </div>

            <div class="status-section">
                <h2>STATUS</h2>
                <span id="modalStatus" class="status production large"></span>
            </div>

        </div>

        <div class="specs-header">
            SPECS & ACCESSORIES
        </div>

        <div class="specs-container">

            <div class="specs-left">

                <div class="spec-row">
                    <strong>Redlight Configuration:</strong>
                    <span id="modalRedlight"></span>
                </div>

                <div class="spec-row">
                    <strong>Seat Type:</strong>
                    <span id="modalSeat"></span>
                </div>

                <div class="spec-row">
                    <strong>Plug Type:</strong>
                    <span id="modalPlug"></span>
                </div>

                <div class="spec-row">
                    <strong>Oxygen Y/N:</strong>
                    <span id="modalOxygen"></span>
                </div>

            </div>

            <div class="notes-box">
                <h3>OTHER IMPORTANT NOTES</h3>
                <p id="modalNotes"></p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
